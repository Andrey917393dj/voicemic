name: Build Virtual Audio Driver

on:
  push:
    branches: [main]
    paths:
      - 'driver/**'
  pull_request:
    branches: [main]
    paths:
      - 'driver/**'
  workflow_dispatch:

jobs:
  build-driver:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64]
        configuration: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows Driver Kit
        run: |
          # Install WDK via winget or choco
          choco install windowsdriverkit11 -y --no-progress
        shell: powershell

      - name: Build Driver
        run: |
          cd driver
          # Use MSBuild with WDK targets
          msbuild voicemic_audio.vcxproj /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}
        shell: powershell
        continue-on-error: true

      - name: Package Driver Files
        run: |
          mkdir -p dist/driver
          # Copy built driver files
          if (Test-Path "driver/${{ matrix.platform }}/${{ matrix.configuration }}/voicemic_audio.sys") {
            Copy-Item "driver/${{ matrix.platform }}/${{ matrix.configuration }}/voicemic_audio.sys" "dist/driver/"
          }
          Copy-Item "driver/voicemic_audio.inf" "dist/driver/"
          # Create a placeholder catalog file
          echo "Driver package created" > dist/driver/BUILD_INFO.txt
          echo "Platform: ${{ matrix.platform }}" >> dist/driver/BUILD_INFO.txt
          echo "Configuration: ${{ matrix.configuration }}" >> dist/driver/BUILD_INFO.txt
          echo "Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> dist/driver/BUILD_INFO.txt
        shell: powershell

      - name: Upload Driver Artifact
        uses: actions/upload-artifact@v4
        with:
          name: voicemic-driver-${{ matrix.platform }}
          path: dist/driver/
          retention-days: 30

  build-installer:
    runs-on: windows-latest
    needs: [build-driver]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r pc-server/requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          cd pc-server
          pyinstaller voicemic.spec --noconfirm
        shell: powershell

      - name: Download Driver Artifact
        uses: actions/download-artifact@v4
        with:
          name: voicemic-driver-x64
          path: driver/build/

      - name: Create Icon (placeholder)
        run: |
          # Create assets directory with placeholder icon
          mkdir -p assets
          # Use Python to create a simple .ico file
          python -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGBA', (256, 256), (108, 92, 231, 255))
          draw = ImageDraw.Draw(img)
          # Microphone shape
          draw.ellipse([88, 40, 168, 140], fill='white')
          draw.rectangle([108, 130, 148, 190], fill='white')
          draw.arc([78, 120, 178, 210], 0, 180, fill='white', width=6)
          draw.rectangle([124, 200, 132, 230], fill='white')
          draw.rectangle([100, 225, 156, 235], fill='white')
          img.save('assets/icon.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])
          "
        shell: powershell

      - name: Create Wizard Images (placeholder)
        run: |
          python -c "
          from PIL import Image, ImageDraw, ImageFont
          # Large wizard image (164x314)
          img = Image.new('RGB', (164, 314), (108, 92, 231))
          draw = ImageDraw.Draw(img)
          draw.text((20, 140), 'VoiceMic', fill='white')
          img.save('assets/wizard_image.bmp')
          # Small wizard image (55x58)
          img2 = Image.new('RGB', (55, 58), (108, 92, 231))
          img2.save('assets/wizard_small.bmp')
          "
        shell: powershell

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/voicemic.iss
        shell: powershell

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMic-Setup
          path: dist/VoiceMic-Setup-*.exe
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VoiceMic-Setup-*.exe
