name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        run: chmod +x android-client/gradlew || true

      - name: Create Gradle Wrapper
        run: |
          cd android-client
          gradle wrapper --gradle-version 8.2

      - name: Build Debug APK
        run: |
          cd android-client
          ./gradlew assembleDebug

      - name: Build Release APK
        run: |
          cd android-client
          ./gradlew assembleRelease || echo "Release build requires signing config, using debug APK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMic-Android-Debug
          path: android-client/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK (if exists)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: VoiceMic-Android-Release
          path: android-client/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android-client/app/build/outputs/apk/debug/*.apk
            android-client/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
