name: Build Windows EXE + Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pc-server/requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          cd pc-server
          pyinstaller voicemic.spec --clean

      - name: Copy language files to dist
        run: |
          Copy-Item -Recurse "pc-server/lang" "pc-server/dist/VoiceMic/lang" -ErrorAction SilentlyContinue
        shell: powershell

      - name: Generate icon and wizard images
        run: |
          mkdir -p assets
          python -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGBA', (256, 256), (108, 92, 231, 255))
          d = ImageDraw.Draw(img)
          d.ellipse([88,40,168,140], fill='white')
          d.rectangle([108,130,148,190], fill='white')
          d.arc([78,120,178,210], 0, 180, fill='white', width=6)
          d.rectangle([124,200,132,230], fill='white')
          d.rectangle([100,225,156,235], fill='white')
          img.save('assets/icon.ico', format='ICO', sizes=[(256,256),(64,64),(32,32),(16,16)])
          wi = Image.new('RGB', (164, 314), (108, 92, 231))
          ImageDraw.Draw(wi).text((20,140), 'VoiceMic', fill='white')
          wi.save('assets/wizard_image.bmp')
          Image.new('RGB', (55, 58), (108, 92, 231)).save('assets/wizard_small.bmp')
          "
        shell: powershell

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMic-Windows
          path: pc-server/dist/VoiceMic/
          retention-days: 30

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: powershell

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/voicemic.iss
        shell: powershell
        continue-on-error: true

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMic-Setup
          path: dist/VoiceMic-Setup-*.exe
          if-no-files-found: ignore
          retention-days: 30

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VoiceMic-Setup-*.exe
            pc-server/dist/VoiceMic/VoiceMic.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
